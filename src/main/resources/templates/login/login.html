<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1, shrink-to-fit=no">
<link rel="stylesheet"
  th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/login/login.css}">
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>
<title>ログイン</title>
</head>
<body class="bg-light">
  <div class="text-center">
    <form method="post" th:action="@{/login}" class="form-login">
      <h2>ログイン</h2>
      <p th:if="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null}"
          th:text="${session['SPRING_SECURITY_LAST_EXCEPTION'].message}"
          class="text-danger">
        ログインエラーメッセージ
      </p>
      <div class="mb-3">
        <label for="userId" class="visually-hidden">userId</label> <input
          type="text" class="form-control" placeholder="ユーザーID" name="userId">
      </div>
      <div class="mb-3">
        <label for="password" class="visually-hidden">password</label> <input
          type="text" class="form-control" placeholder="パスワード"
          name="password">
      </div>
      <input type="submit" value="ログイン" class="btn btn-primary">
    </form>
    <a th:href="@{/user/signup}">新規登録はこちら</a>
  </div>
</body>
</html>
